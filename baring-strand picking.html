<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Selector</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="Baring-strand.css">
</head>
<body>

    
    <div class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <h1 class="page-title">Select a Track</h1>

    <div class="container">

        <a href="Pahid-stem.html" class="track-card">
            <div class="track-img-wrap">
                <img src="stem.jpg" alt="STEM">
            </div>
            <span class="track-label">STEM</span>
        </a>

        <a href="Abellana-humss.html" class="track-card">
            <div class="track-img-wrap">
                <img src="hums.jpg" alt="HUMSS">
            </div>
            <span class="track-label">HUMSS</span>
        </a>

        <a href="sabandal-abm.html" class="track-card">
            <div class="track-img-wrap">
                <img src="abm.jpg" alt="ABM">
            </div>
            <span class="track-label">ABM</span>
        </a>

        <a href="Bentoy-ict.html" class="track-card">
            <div class="track-img-wrap">
                <img src="ict.jpg" alt="ICT">
            </div>
            <span class="track-label">ICT</span>
        </a>

        <a href = "Johnray-gas.html" class="track-card">
            <div class="track-img-wrap">
                <img src="gas.png" alt="GAS">
            </div>
            <span class="track-label">GAS</span>

        <a href="parajes-he.html" class="track-card">
            <div class="track-img-wrap">
                <img src="tvl.jpg" alt="TVL">
            </div>
            <span class="track-label">TVL</span>
        </a>

        <a href="Johnray-GeneralInventory.html" class="track-card inventory-card">
            <div class="track-img-wrap inventory-icon">
                <i class="fas fa-boxes-stacked"></i>
            </div>
            <span class="track-label">General Inventory</span>
        </a>

    </div>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
