<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMSS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="Abellana-humss.css">
</head>
<body>

    <div class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </div>

    <h1 class="page-title">HUMSS</h1>

    <main class="container">

        <section class="grade">
            <div class="grade-box">11TH<br><span>GRADE</span></div>
            <a href="ict-week1.html"><button class="semester" onclick="selectSemester('Grade 11 - Semester 1')">1st Semester</button></a>
            <a href="ict-week2.html"><button class="semester" onclick="selectSemester('Grade 11 - Semester 2')">2nd Semester</button></a>
        </section>

        <section class="grade">
            <div class="grade-box">12TH<br><span>GRADE</span></div>
            <a href="ict-week3.html"><button class="semester" onclick="selectSemester('Grade 12 - Semester 1')">1st Semester</button></a>
            <a href="ict-week4.html"><button class="semester" onclick="selectSemester('Grade 12 - Semester 2')">2nd Semester</button></a>
        </section>

    </main>

    <script>
       
        document.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", function (e) {
                const href = this.getAttribute("href");
                if (!href || href.startsWith("#")) return;
                e.preventDefault();
                document.body.classList.add("fade-out");
                setTimeout(() => {
                    window.location.href = href;
                }, 400);
            });
        });

        function goBack() {
            document.body.classList.add("fade-out");
            setTimeout(() => {
                window.history.back();
            }, 400);
        }

        function selectSemester(label) {
            console.log('Selected:', label);
        }
    </script>

</body>
</html>
